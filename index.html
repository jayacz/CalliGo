  <style>
    /* RESET & SCROLLING */
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
    
    html, body { 
      width: 100%; 
      min-height: 100%;
      background-color: #f8f5ff; /* Extra Light Purple */
      overflow-x: hidden;
      overflow-y: auto; 
    }
    
    body { 
      font-family: 'Cormorant Garamond', serif; 
      color: #8c6d4f;
      background-image: radial-gradient(circle at 20% 30%, rgba(225, 200, 255, 0.4) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 215, 245, 0.4) 0%, transparent 50%);
      background-attachment: fixed;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
    }

    /* ŠÍRKY */
    .w-total { width: 100%; max-width: 420px; } 
    .w-symbol { width: 100%; max-width: 350px; } 
    .w-nav { width: 100%; max-width: 280px; }    

    /* HEADER - COMPACT CENTERING */
    .app-header { width: 100%; max-width: 420px; text-align: center; margin-bottom: 20px; }
    .header-group { 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; 
      align-items: center; 
      width: 100%;
      margin-bottom: -5px; /* Pull motto closer up */
    }
    .title-char { 
      font-family: 'Noto Serif SC', serif; 
      font-size: clamp(2.5rem, 10vw, 4.2rem); 
      color: #a67c52; 
      -webkit-text-stroke: 1.5px #000; 
      font-weight: 400; 
      justify-self: end;
      padding-right: 15px;
    }
    .app-title-text { font-family: 'Dancing Script', cursive; color: #000; font-size: clamp(2.5rem, 10vw, 4.2rem); line-height: 1; }
    .title-spacer { width: 100%; } 
    
    .motto { 
      font-size: clamp(1rem, 4.5vw, 1.6rem); font-weight: 800; text-align: center; 
      text-decoration: underline; text-decoration-color: #000; text-underline-offset: 5px; text-decoration-thickness: 2px;
      margin-top: 0px; /* Reduced gap */
      line-height: 1;
    }

    /* CANVAS - ALL CORNERS ROUNDED */
    .canvas-card { 
      position: relative; width: 100%; aspect-ratio: 1/1; 
      background-color: #f7ead0; border: 8px solid white; 
      border-radius: 2.5rem; 
      overflow: hidden; 
    }
    .paper-texture { background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"); width: 100%; height: 100%; }
    
    #canvas-wrap.show-grid .paper-texture {
      background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"),
        linear-gradient(to right, rgba(140,109,79,0.3) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(140,109,79,0.3) 1px, transparent 1px) !important;
      background-size: auto, 100px 100px, 100px 100px !important;
    }

    /* BUTTONS */
    .btn-base { transition: all 0.2s ease; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; border-radius: 1.5rem; cursor: pointer; }
    .btn-primary { background-color: #a67c52; color: white; border: 3px solid #a67c52; }
    .btn-secondary { background-color: white; color: #a67c52; border: 3px solid rgba(166, 124, 82, 0.3); }

    /* LAYERS */
    #drawingCanvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; width: 100%; height: 100%; }
    #guideCanvas { position: absolute; top: 0; left: 0; z-index: 2; opacity: 0.55; pointer-events: none; width: 100%; height: 100%; }
    
    .footer-credit { margin-top: 30px; font-size: 1.1rem; opacity: 0.8; font-weight: 700; color: #8c6d4f; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>

<body>

    <!-- 1. HEADER -->
    <header class="app-header">
      <div class="header-group">
        <span class="title-char">书</span>
        <h1 class="app-title-text">Calli GO</h1>
        <div class="title-spacer"></div>
      </div>
      <p class="motto">Gotta Write ’Em All!</p>
    </header>

    <!-- 2. NAVIGATION -->
    <nav class="w-nav flex gap-3 mb-6">
      <button id="btnPractice" class="btn-base flex-1 py-3 text-lg btn-primary">Practice</button>
      <button id="btnGallery" class="btn-base flex-1 py-3 text-lg btn-secondary">Callidex</button>
    </nav>

    <!-- 3. MAIN CONTENT -->
    <main class="w-full flex flex-col items-center">
      
      <!-- PRACTICE VIEW -->
      <div id="practiceView" class="w-full flex flex-col items-center">
        
        <!-- Info Card -->
        <div class="w-symbol flex items-center justify-between bg-white/70 backdrop-blur-xl p-4 mb-6 rounded-[2.5rem] border border-white shadow-lg">
          <div class="flex items-center gap-8">
            <div id="displayArea" class="text-7xl text-black font-normal leading-none" style="font-family:'Noto Serif SC',serif;">永</div>
            <div>
              <p id="charPinyin" class="text-2xl font-bold text-[#a67c52]">yǒng</p>
              <p id="charMeaning" class="text-2xl italic text-black font-black">forever</p>
            </div>
          </div>
          <button id="btnGenerate" class="btn-primary p-4 rounded-2xl active:scale-90 transition-transform">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>

        <!-- Square Canvas Block -->
        <div class="w-total canvas-card shadow-xl mb-4" id="canvas-wrap">
          <canvas id="guideCanvas" class="paper-texture"></canvas>
          <canvas id="drawingCanvas"></canvas>
        </div>

        <!-- Bottom Toolbar -->
        <div class="w-symbol flex flex-col gap-3 bg-white/30 p-4 rounded-[2.5rem] shadow-lg">
          <div class="flex gap-3 w-full">
            <button id="btnStepBack" class="btn-base p-4 btn-secondary shrink-0"><i data-lucide="undo-2"></i></button>
            <button id="btnClearCanvas" class="btn-base flex-1 py-4 text-xl btn-secondary uppercase">Clear</button>
            <button id="btnStepForward" class="btn-base p-4 btn-secondary shrink-0"><i data-lucide="redo-2"></i></button>
          </div>
          <div class="flex gap-3 w-full">
            <button id="btnToggleGrid" class="btn-base flex-1 py-4 text-xl btn-secondary">Grid</button>
            <button id="btnToggleGuide" class="btn-base flex-1 py-4 text-xl btn-secondary">Trace</button>
          </div>
        </div>
      </div>

      <!-- CALLIDEX VIEW -->
      <div id="galleryView" class="hidden w-full flex flex-col items-center px-4">
        <input type="text" id="searchBar" class="w-full max-w-[350px] p-4 mb-8 rounded-2xl border-2 border-[#a67c52]/30 outline-none text-center text-xl shadow-sm" placeholder="Search by meaning...">
        <div id="galleryGrid" class="w-total grid grid-cols-2 gap-6 pb-12"></div>
      </div>

    </main>

  let currentChar = characters[0];
  let isTraceActive = false;

  // --- CANVAS ENGINE ---
  const setupCanvas = () => {
    const canvas = document.getElementById('drawingCanvas');
    const gCanvas = document.getElementById('guideCanvas');
    const ctx = canvas.getContext('2d');
    const gCtx = gCanvas.getContext('2d');
    let isDrawing = false, strokes = [], currentStroke = [], redoStack = [];
    let lastX, lastY, lastW, lastTime;

    const resize = () => {
      const parent = canvas.parentElement;
      const dpr = window.devicePixelRatio || 1;
      const size = parent.clientWidth;
      canvas.width = size * dpr; canvas.height = size * dpr;
      gCanvas.width = size * dpr; gCanvas.height = size * dpr;
      canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr); gCtx.scale(dpr, dpr);
      redraw();
    };

    const redraw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#000';
      strokes.forEach(s => {
        if (s.length < 2) return;
        for (let i = 1; i < s.length; i++) {
          const p1 = s[i-1], p2 = s[i];
          const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
          const steps = Math.ceil(dist * 2.5);
          for (let st = 0; st <= steps; st++) {
            const t = st / steps;
            const x = p1.x + (p2.x - p1.x) * t;
            const y = p1.y + (p2.y - p1.y) * t;
            const w = p1.w + (p2.w - p1.w) * t;
            ctx.beginPath(); ctx.arc(x, y, w / 2, 0, Math.PI * 2); ctx.fill();
          }
        }
      });
      drawGuide();
    };

    const drawGuide = () => {
      gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
      if (!isTraceActive) return;
      const s = gCanvas.width / (window.devicePixelRatio || 1);
      gCtx.font = `400 ${s * 0.72}px "Noto Serif SC"`;
      gCtx.fillStyle = 'rgba(0,0,0,0.55)'; 
      gCtx.textAlign = 'center'; gCtx.textBaseline = 'middle';
      gCtx.fillText(currentChar.char, s/2, s/2);
    };

    const getPos = (e) => {
      const r = canvas.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX);
      const cy = (e.touches ? e.touches[0].clientY : e.clientY);
      return { x: cx - r.left, y: cy - r.top, t: Date.now() };
    };

    canvas.addEventListener('pointerdown', (e) => {
      isDrawing = true; const p = getPos(e);
      lastX = p.x; lastY = p.y; lastTime = p.t;
      lastW = 22; // JUICY BOLD START
      currentStroke = [{ x: p.x, y: p.y, w: lastW }];
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(p.x, p.y, lastW/2, 0, Math.PI*2); ctx.fill();
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return;
      const p = getPos(e);
      const d = Math.hypot(p.x - lastX, p.y - lastY);
      const v = (p.t - lastTime) > 0 ? d / (p.t - lastTime) : 0;
      let targetW = Math.max(1.5, 20 - (v * 10)); 
      const cw = lastW * 0.3 + targetW * 0.7;
      const pPrev = currentStroke[currentStroke.length - 1], pNew = { x: p.x, y: p.y, w: cw };
      
      // Draw segment
      const dist = Math.hypot(pNew.x - pPrev.x, pNew.y - pPrev.y);
      const steps = Math.ceil(dist * 2.5);
      for (let st = 0; st <= steps; st++) {
        const t = st / steps;
        ctx.beginPath();
        ctx.arc(pPrev.x + (pNew.x - pPrev.x) * t, pPrev.y + (pNew.y - pPrev.y) * t, (pPrev.w + (pNew.w - pPrev.w) * t) / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      currentStroke.push(pNew);
      lastX = p.x; lastY = p.y; lastTime = p.t; lastW = cw;
    });

    canvas.addEventListener('pointerup', () => { if (isDrawing) strokes.push([...currentStroke]); isDrawing = false; });
    window.addEventListener('resize', resize);

    document.getElementById('btnClearCanvas').onclick = () => { strokes = []; redraw(); };
    document.getElementById('btnStepBack').onclick = () => { if(strokes.length > 0) { redoStack.push(strokes.pop()); redraw(); } };
    document.getElementById('btnStepForward').onclick = () => { if(redoStack.length > 0) { strokes.push(redoStack.pop()); redraw(); } };
    
    document.getElementById('btnToggleGrid').onclick = (e) => {
      const isOn = document.getElementById('canvas-wrap').classList.toggle('show-grid');
      e.target.classList.replace(isOn ? 'btn-secondary' : 'btn-primary', isOn ? 'btn-primary' : 'btn-secondary');
    };

    document.getElementById('btnToggleGuide').onclick = (e) => { 
      isTraceActive = !isTraceActive;
      e.target.classList.replace(isTraceActive ? 'btn-secondary' : 'btn-primary', isTraceActive ? 'btn-primary' : 'btn-secondary');
      drawGuide(); 
    };

    setTimeout(resize, 100);
    return { clear: () => { strokes = []; redraw(); }, drawGuide };
  };

  const canvasCtrl = setupCanvas();

  const renderGallery = (filterText = "") => {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    let list = (filterText.trim() === "") ? [...characters].sort(() => 0.5 - Math.random()).slice(0, 8) : characters.filter(i => i.meaning.toLowerCase().startsWith(filterText.toLowerCase()));

    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'bg-white/70 p-8 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer active:scale-90 shadow-sm';
      div.innerHTML = `<div class="text-7xl mb-4 text-black font-normal" style="font-family:'Noto Serif SC'">${item.char}</div><div class="text-2xl uppercase font-bold text-[#a67c52]">${item.pinyin}</div><div class="text-2xl italic text-black font-black text-center leading-tight">${item.meaning}</div>`;
      div.onclick = () => {
        currentChar = item;
        document.getElementById('displayArea').innerText = item.char;
        document.getElementById('charPinyin').innerText = item.pinyin;
        document.getElementById('charMeaning').innerText = item.meaning;
        canvasCtrl.clear(); canvasCtrl.drawGuide();
        document.getElementById('btnPractice').click();
      };
      grid.appendChild(div);
    });
  };

  document.getElementById('searchBar').oninput = (e) => renderGallery(e.target.value);
  document.getElementById('btnGallery').onclick = () => {
    document.getElementById('galleryView').classList.remove('hidden');
    document.getElementById('practiceView').classList.add('hidden');
    document.getElementById('btnGallery').classList.replace('btn-secondary', 'btn-primary');
    document.getElementById('btnPractice').classList.replace('btn-primary', 'btn-secondary');
    renderGallery();
  };
  document.getElementById('btnPractice').onclick = () => {
    document.getElementById('practiceView').classList.remove('hidden');
    document.getElementById('galleryView').classList.add('hidden');
    document.getElementById('btnPractice').classList.replace('btn-secondary', 'btn-primary');
    document.getElementById('btnGallery').classList.replace('btn-primary', 'btn-secondary');
  };
  document.getElementById('btnGenerate').onclick = () => {
    currentChar = characters[Math.floor(Math.random()*characters.length)];
    document.getElementById('displayArea').innerText = currentChar.char;
    document.getElementById('charPinyin').innerText = currentChar.pinyin;
    document.getElementById('charMeaning').innerText = currentChar.meaning;
    canvasCtrl.clear(); canvasCtrl.drawGuide();
  };
