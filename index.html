<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>书 Calli GO</title>
  
  <meta name="theme-color" content="#f0eaff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link id="appleTouchIcon" rel="apple-touch-icon" href="favicon.svg">

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+SC:wght@400;700;900&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    
    html, body { 
      width: 100%; 
      height: 100dvh; 
      background-color: #f8f5ff; 
      overflow: hidden; 
    }
    
    body { 
      font-family: 'Cormorant Garamond', serif; 
      color: #8c6d4f;
      background-image: radial-gradient(circle at 20% 30%, rgba(225, 200, 255, 0.3) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 215, 245, 0.3) 0%, transparent 50%);
      display: flex; flex-direction: column; align-items: center;
      padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
    }

    .w-total { width: 100%; max-width: 420px; } 
    .w-symbol { width: 100%; max-width: 350px; } 

    /* HEADER - PERFECT CENTERING WITH CHAR ON LEFT */
    .app-header { width: 100%; max-width: 420px; text-align: center; flex-shrink: 0; padding-top: 10px; }
    .header-group { 
      display: grid; 
      grid-template-columns: 1fr auto 1fr; /* Char | Title | Spacer */
      align-items: center; 
      width: 100%; 
      margin-bottom: -5px; 
    }
    .title-char { 
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.5rem, 10vw, 4.2rem);
      color: #a67c52;
      -webkit-text-stroke: 1.5px #000; 
      font-weight: 400; 
      line-height: 1; 
      justify-self: end;
      padding-right: 15px; 
    }
    .app-title-text { font-family: 'Dancing Script', cursive; color: #000; font-size: clamp(2.5rem, 10vw, 4.2rem); line-height: 1; }
    .title-spacer { width: 100%; } 
    
    .motto { font-size: clamp(1rem, 4.2vw, 1.5rem); font-weight: 800; text-align: center; text-decoration: underline; text-decoration-color: #000; text-underline-offset: 4px; text-decoration-thickness: 2px; margin-top: 2px; }

    /* NAVIGATION */
    nav { flex-shrink: 0; margin: 12px 0; width: 280px; display: flex; gap: 8px; }

    /* MAIN AREA */
    main { flex-grow: 1; width: 100%; position: relative; overflow: hidden; min-height: 0; }
    .view-container { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; }

    /* PRACTICE VIEW */
    #practiceView { height: 100%; justify-content: space-between; padding-bottom: 5px; overflow: hidden; }

    /* CALLIDEX VIEW (Scrollable) */
    #galleryView { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 0 80px 0; display: flex; flex-direction: column; align-items: center; }
    #galleryView::-webkit-scrollbar { display: none; }

    /* CANVAS */
    .canvas-flex-box { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 5px 0; }
    .canvas-card { position: relative; aspect-ratio: 1/1; max-height: 100%; max-width: 100%; background-color: #f7ead0; border: 8px solid white; border-radius: 2.5rem; overflow: hidden; }
    #drawingCanvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; width: 100%; height: 100%; }
    #guideCanvas { position: absolute; top: 0; left: 0; z-index: 2; opacity: 0.6; pointer-events: none; width: 100%; height: 100%; }
    .paper-texture { background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"); width: 100%; height: 100%; }

    #canvas-card.show-grid .paper-texture {
      background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"),
        linear-gradient(to right, rgba(140,109,79,0.3) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(140,109,79,0.3) 1px, transparent 1px) !important;
      background-size: auto, 25% 25%, 25% 25% !important;
      background-position: center !important;
    }

    /* BUTTONS */
    .btn-base { transition: all 0.2s ease; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; border-radius: 1.5rem; cursor: pointer; }
    .btn-primary { background-color: #a67c52; color: white; border: 3px solid #a67c52; }
    .btn-secondary { background-color: white; color: #a67c52; border: 3px solid rgba(166, 124, 82, 0.3); }

    .footer-credit { flex-shrink: 0; padding: 5px 0; font-size: 0.9rem; opacity: 0.8; font-weight: 700; color: #8c6d4f; }
    .hidden { display: none !important; }

    /* STROKE ORDER MODAL */
    .stroke-modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
    .stroke-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .stroke-modal-content { position: relative; background: #f8f5ff; border-radius: 2.5rem; padding: 20px; width: 90%; max-width: 350px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 4px solid white; }
    .stroke-modal-header { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
    .stroke-writer-box { width: 250px; height: 250px; background: #f7ead0; border: 6px solid white; border-radius: 1.5rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .stroke-writer-box svg { display: block; }
  </style>
</head>
<body>

    <header class="app-header">
      <div class="header-group">
        <span class="title-char">书</span>
        <h1 class="app-title-text">Calli GO</h1>
        <div class="title-spacer"></div>
      </div>
      <p class="motto">Gotta Write ’Em All!</p>
    </header>

    <nav>
      <button id="btnPractice" class="btn-base flex-1 py-2.5 text-lg btn-primary">Practice</button>
      <button id="btnGallery" class="btn-base flex-1 py-2.5 text-lg btn-secondary">Callidex</button>
    </nav>

    <main>
      <div id="practiceView" class="view-container">
        <!-- Symbol Card -->
        <div class="w-symbol flex items-center justify-between bg-white/70 backdrop-blur-xl p-3 rounded-[2rem] border border-white shadow-sm flex-shrink-0">
          <div class="flex items-center gap-6 pl-2">
            <div id="displayArea" class="text-5xl text-black font-normal" style="font-family:'Noto Serif SC',serif;">永</div>
            <div>
              <p id="charPinyin" class="text-lg font-bold text-[#a67c52] leading-tight">yǒng</p>
              <p id="charMeaning" class="text-lg italic text-black font-black leading-tight">forever</p>
            </div>
          </div>
          <button id="btnGenerate" class="btn-primary p-2.5 rounded-xl active:scale-90"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </div>

        <!-- Canvas adaptive box -->
        <div class="canvas-flex-box w-total px-2">
            <div class="canvas-card shadow-lg" id="canvas-card">
              <canvas id="guideCanvas" class="paper-texture"></canvas>
              <canvas id="drawingCanvas"></canvas>
            </div>
        </div>

        <!-- Spodný Toolbar -->
        <div class="w-symbol flex flex-col gap-2 bg-white/30 p-3 rounded-[2rem] shadow-md flex-shrink-0">
          <div class="flex gap-2 w-full">
            <button id="btnStepBack" class="btn-base p-3 btn-secondary shrink-0"><i data-lucide="undo-2"></i></button>
            <button id="btnClearCanvas" class="btn-base flex-1 py-4 text-xl btn-secondary uppercase">Clear</button>
            <button id="btnStepForward" class="btn-base p-3 btn-secondary shrink-0"><i data-lucide="redo-2"></i></button>
          </div>
          <div class="flex gap-2 w-full">
            <button id="btnToggleGrid" class="btn-base flex-1 py-3 text-lg btn-secondary">Grid</button>
            <button id="btnToggleGuide" class="btn-base flex-1 py-3 text-lg btn-secondary">Trace</button>
            <button id="btnStrokes" class="btn-base flex-1 py-3 text-lg btn-secondary">Strokes</button>
          </div>
        </div>
      </div>

      <div id="galleryView" class="view-container hidden">
        <input type="text" id="searchBar" class="w-full max-w-[350px] p-3 mb-6 rounded-xl border-2 border-[#a67c52]/30 outline-none text-center text-xl shadow-sm flex-shrink-0" placeholder="Search by meaning...">
        <div id="galleryGrid" class="w-full grid grid-cols-2 gap-4 px-2"></div>
      </div>
    </main>

    <!-- Stroke Order Modal -->
    <div id="strokeModal" class="stroke-modal hidden">
      <div class="stroke-modal-backdrop"></div>
      <div class="stroke-modal-content">
        <div class="stroke-modal-header">
          <span id="strokeModalChar" class="text-3xl font-bold" style="font-family:'Noto Serif SC',serif;">永</span>
          <span class="text-lg text-[#a67c52] font-bold">Stroke Order</span>
          <button id="btnCloseStrokes" class="btn-base p-2 btn-secondary rounded-xl"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="strokeWriterTarget" class="stroke-writer-box"></div>
        <div class="flex gap-2 w-full mt-3">
          <button id="btnAnimateStrokes" class="btn-base flex-1 py-3 text-lg btn-primary">Animate</button>
          <button id="btnPauseStrokes" class="btn-base flex-1 py-3 text-lg btn-secondary hidden">Pause</button>
        </div>
      </div>
    </div>

    <footer class="footer-credit">Vibe coded for Adel by Jaya 🫰</footer>

  <script>
  // --- DATABASE (loaded dynamically from Make Me a Hanzi) ---
  const FALLBACK_CHARS = [
    { char:'永', pinyin:'yǒng', meaning:'forever' },
    { char:'我', pinyin:'wǒ', meaning:'I / me' },
    { char:'你', pinyin:'nǐ', meaning:'you' },
    { char:'他', pinyin:'tā', meaning:'he / him' },
    { char:'她', pinyin:'tā', meaning:'she / her' },
    { char:'这', pinyin:'zhè', meaning:'this' },
    { char:'那', pinyin:'nà', meaning:'that' },
    { char:'好', pinyin:'hǎo', meaning:'good' },
    { char:'大', pinyin:'dà', meaning:'big' },
    { char:'小', pinyin:'xiǎo', meaning:'small' },
    { char:'书', pinyin:'shū', meaning:'book' },
    { char:'爱', pinyin:'ài', meaning:'love' },
    { char:'心', pinyin:'xīn', meaning:'heart' },
    { char:'龙', pinyin:'lóng', meaning:'dragon' },
    { char:'山', pinyin:'shān', meaning:'mountain' },
    { char:'水', pinyin:'shuǐ', meaning:'water' },
    { char:'火', pinyin:'huǒ', meaning:'fire' }
  ];

  let characters = [...FALLBACK_CHARS];
  let dbLoaded = false;

  // Load full database from Make Me a Hanzi (CDN)
  async function loadHanziDatabase() {
    try {
      const res = await fetch('https://cdn.jsdelivr.net/gh/skishore/makemeahanzi@master/dictionary.txt');
      if (!res.ok) throw new Error('fetch failed');
      const text = await res.text();
      const lines = text.trim().split('\n');
      const parsed = [];
      for (const line of lines) {
        try {
          const entry = JSON.parse(line);
          // Only single characters with pinyin and definition
          if (entry.character && entry.character.length === 1 && entry.pinyin && entry.pinyin.length > 0 && entry.definition) {
            parsed.push({
              char: entry.character,
              pinyin: entry.pinyin[0],
              meaning: entry.definition.split(',')[0].split(';')[0].trim()
            });
          }
        } catch(e) { /* skip malformed lines */ }
      }
      if (parsed.length > 100) {
        characters = parsed;
        dbLoaded = true;
        console.log(`Loaded ${characters.length} characters from Hanzi database`);
      }
    } catch(e) {
      console.warn('Could not load Hanzi database, using fallback:', e.message);
    }
  }

  loadHanziDatabase();

  let currentChar = { char:'永', pinyin:'yǒng', meaning:'forever' };
  let isTraceActive = false;

  const setupCanvas = () => {
    const canvas = document.getElementById('drawingCanvas');
    const gCanvas = document.getElementById('guideCanvas');
    const ctx = canvas.getContext('2d');
    const gCtx = gCanvas.getContext('2d');
    let isDrawing = false, strokes = [], currentStroke = [], redoStack = [];
    let lastX, lastY, lastW, lastTime;

    const resize = () => {
      const flexBox = canvas.parentElement.parentElement;
      const dpr = window.devicePixelRatio || 1;
      const size = Math.min(flexBox.clientWidth, flexBox.clientHeight);
      const card = canvas.parentElement;
      card.style.width = size + 'px'; card.style.height = size + 'px';
      canvas.width = size * dpr; canvas.height = size * dpr;
      gCanvas.width = size * dpr; gCanvas.height = size * dpr;
      canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr); gCtx.scale(dpr, dpr);
      redraw();
    };

    const redraw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#000';
      strokes.forEach(s => drawPath(s));
      drawGuide();
    };

    const drawPath = (pts) => {
      if (pts.length < 2) return;
      for (let i = 1; i < pts.length; i++) {
        const p1 = pts[i-1], p2 = pts[i];
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        const steps = Math.ceil(dist * 2.5);
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const x = p1.x + (p2.x - p1.x) * t;
          const y = p1.y + (p2.y - p1.y) * t;
          const w = (p1.w + (p2.w - p1.w) * t);
          ctx.beginPath(); ctx.arc(x, y, w / 2, 0, Math.PI * 2); ctx.fill();
        }
      }
    };

    const drawGuide = async () => {
      gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
      if (!isTraceActive) return;
      await document.fonts.load('400 48px "Noto Serif SC"', currentChar.char);
      const s = gCanvas.width / (window.devicePixelRatio || 1);
      gCtx.font = `400 ${s * 0.72}px "Noto Serif SC"`;
      gCtx.fillStyle = 'rgba(0,0,0,0.4)';
      gCtx.textAlign = 'center'; gCtx.textBaseline = 'middle';
      gCtx.fillText(currentChar.char, s/2, s/2);
    };

    const getPos = (e) => {
      const r = canvas.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX);
      const cy = (e.touches ? e.touches[0].clientY : e.clientY);
      return { x: cx - r.left, y: cy - r.top, t: Date.now() };
    };

    canvas.addEventListener('pointerdown', (e) => {
      isDrawing = true; const p = getPos(e);
      lastX = p.x; lastY = p.y; lastTime = p.t; lastW = 16;
      currentStroke = [{ x: p.x, y: p.y, w: lastW }];
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(p.x, p.y, lastW/2, 0, Math.PI*2); ctx.fill();
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return;
      const p = getPos(e); const d = Math.hypot(p.x - lastX, p.y - lastY);
      const v = (p.t - lastTime) > 0 ? d / (p.t - lastTime) : 0;
      let targetW = Math.max(3, 16 - (v * 5)); 
      const cw = lastW * 0.3 + targetW * 0.7;
      const pPrev = currentStroke[currentStroke.length - 1], pNew = { x: p.x, y: p.y, w: cw };
      drawPath([pPrev, pNew]);
      currentStroke.push(pNew);
      lastX = p.x; lastY = p.y; lastTime = p.t; lastW = cw;
    });

    canvas.addEventListener('pointerup', () => { if (isDrawing) strokes.push([...currentStroke]); isDrawing = false; });
    window.addEventListener('resize', resize);
    document.getElementById('btnClearCanvas').onclick = () => { strokes = []; redraw(); };
    document.getElementById('btnStepBack').onclick = () => { if(strokes.length > 0) { redoStack.push(strokes.pop()); redraw(); } };
    document.getElementById('btnStepForward').onclick = () => { if(redoStack.length > 0) { strokes.push(redoStack.pop()); redraw(); } };
    
    document.getElementById('btnToggleGrid').onclick = (e) => {
      const isOn = document.getElementById('canvas-card').classList.toggle('show-grid');
      e.target.classList.replace(isOn ? 'btn-secondary' : 'btn-primary', isOn ? 'btn-primary' : 'btn-secondary');
    };

    document.getElementById('btnToggleGuide').onclick = (e) => { 
      isTraceActive = !isTraceActive;
      e.target.classList.replace(isTraceActive ? 'btn-secondary' : 'btn-primary', isTraceActive ? 'btn-primary' : 'btn-secondary');
      drawGuide(); 
    };

    setTimeout(resize, 100);
    return { clear: () => { strokes = []; redraw(); }, drawGuide };
  };

  const canvasCtrl = setupCanvas();

  const renderGallery = (filterText = "") => {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    const q = filterText.trim().toLowerCase();
    let list = (q === "") ? [...characters].sort(() => 0.5 - Math.random()).slice(0, 8) : characters.filter(i => i.meaning.toLowerCase().startsWith(q)).slice(0, 50);
    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'bg-white/70 p-8 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer transition-all active:scale-95 shadow-sm';
      div.innerHTML = `<div class="text-7xl mb-4 text-black font-normal" style="font-family:'Noto Serif SC',serif">${item.char}</div><div class="text-2xl uppercase font-bold text-[#a67c52]">${item.pinyin}</div><div class="text-2xl italic text-black font-black text-center">${item.meaning}</div>`;
      div.onclick = () => {
        currentChar = item;
        document.getElementById('displayArea').innerText = item.char;
        document.getElementById('charPinyin').innerText = item.pinyin;
        document.getElementById('charMeaning').innerText = item.meaning;
        canvasCtrl.clear(); canvasCtrl.drawGuide();
        document.getElementById('btnPractice').click();
      };
      grid.appendChild(div);
    });
  };

  document.getElementById('searchBar').oninput = (e) => renderGallery(e.target.value);
  document.getElementById('btnGallery').onclick = () => {
    document.getElementById('galleryView').classList.remove('hidden');
    document.getElementById('practiceView').classList.add('hidden');
    document.getElementById('btnGallery').classList.replace('btn-secondary', 'btn-primary');
    document.getElementById('btnPractice').classList.replace('btn-primary', 'btn-secondary');
    renderGallery();
  };
  document.getElementById('btnPractice').onclick = () => {
    document.getElementById('practiceView').classList.remove('hidden');
    document.getElementById('galleryView').classList.add('hidden');
    document.getElementById('btnPractice').classList.replace('btn-secondary', 'btn-primary');
    document.getElementById('btnGallery').classList.replace('btn-primary', 'btn-secondary');
  };
  document.getElementById('btnGenerate').onclick = () => {
    currentChar = characters[Math.floor(Math.random()*characters.length)];
    document.getElementById('displayArea').innerText = currentChar.char;
    document.getElementById('charPinyin').innerText = currentChar.pinyin;
    document.getElementById('charMeaning').innerText = currentChar.meaning;
    canvasCtrl.clear(); canvasCtrl.drawGuide();
  };

  // --- STROKE ORDER MODAL ---
  let hwWriter = null;
  let strokePaused = false;
  let strokePlaying = false;
  let currentStrokeNum = 0;
  let totalStrokes = 0;
  const strokeModal = document.getElementById('strokeModal');
  const strokeTarget = document.getElementById('strokeWriterTarget');
  const btnAnimate = document.getElementById('btnAnimateStrokes');
  const btnPause = document.getElementById('btnPauseStrokes');

  function updateStrokeButtons(playing) {
    strokePlaying = playing;
    btnAnimate.classList.toggle('hidden', playing);
    btnPause.classList.toggle('hidden', !playing);
    if (playing) {
      btnPause.textContent = 'Pause';
      btnPause.classList.replace('btn-primary', 'btn-secondary');
    }
  }

  async function animateStrokeByStroke() {
    strokePaused = false;
    updateStrokeButtons(true);
    for (let i = currentStrokeNum; i < totalStrokes; i++) {
      if (strokePaused) { currentStrokeNum = i; return; }
      await new Promise((resolve, reject) => {
        hwWriter.animateStroke(i, { onComplete: resolve });
      });
      // Small delay between strokes
      if (i < totalStrokes - 1 && !strokePaused) {
        await new Promise(r => setTimeout(r, 250));
      }
    }
    currentStrokeNum = 0;
    updateStrokeButtons(false);
  }

  document.getElementById('btnStrokes').onclick = () => {
    strokeTarget.innerHTML = '';
    strokePaused = false;
    strokePlaying = false;
    currentStrokeNum = 0;
    document.getElementById('strokeModalChar').innerText = currentChar.char;

    hwWriter = HanziWriter.create(strokeTarget, currentChar.char, {
      width: 238,
      height: 238,
      padding: 10,
      showOutline: true,
      showCharacter: false,
      strokeColor: '#000',
      outlineColor: '#ddd',
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 300,
      charDataLoader: (char, onComplete) => {
        fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(char)}.json`)
          .then(r => r.json())
          .then(data => { totalStrokes = data.strokes.length; onComplete(data); });
      }
    });

    strokeModal.classList.remove('hidden');
    updateStrokeButtons(false);
    setTimeout(() => animateStrokeByStroke(), 300);
  };

  btnAnimate.onclick = () => {
    if (hwWriter) {
      hwWriter.hideCharacter();
      currentStrokeNum = 0;
      animateStrokeByStroke();
    }
  };

  btnPause.onclick = () => {
    if (strokePaused) {
      // Resume
      strokePaused = false;
      btnPause.textContent = 'Pause';
      btnPause.classList.replace('btn-primary', 'btn-secondary');
      animateStrokeByStroke();
    } else {
      // Pause
      strokePaused = true;
      btnPause.textContent = 'Resume';
      btnPause.classList.replace('btn-secondary', 'btn-primary');
    }
  };

  document.getElementById('btnCloseStrokes').onclick = () => {
    strokeModal.classList.add('hidden');
    strokeTarget.innerHTML = '';
    hwWriter = null;
  };

  // Close on backdrop click
  document.querySelector('.stroke-modal-backdrop').onclick = () => {
    document.getElementById('btnCloseStrokes').click();
  };

  lucide.createIcons();

  // Generate apple-touch-icon PNG from canvas once font is loaded
  document.fonts.load('400 48px "Noto Serif SC"', '书').then(() => {
    const s = 180;
    const c = document.createElement('canvas');
    c.width = s; c.height = s;
    const x = c.getContext('2d');
    x.fillStyle = '#f0eaff';
    x.beginPath(); x.roundRect(0, 0, s, s, 32); x.fill();
    x.font = '400 140px "Noto Serif SC"';
    x.fillStyle = '#a67c52';
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText('书', s/2, s/2 + 6);
    const link = document.getElementById('appleTouchIcon');
    link.href = c.toDataURL('image/png');
  });
